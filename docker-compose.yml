# Docker Compose orchestrates multiple containers.
# Right now we have one service (backend).
# In production you'd add: qdrant (persistent), postgres, redis, nginx.

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      # Mount uploads directory so PDFs persist across restarts
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

