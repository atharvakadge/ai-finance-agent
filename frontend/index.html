<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinLens AI — Financial Research Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg-deep:#06080F;--bg-primary:#0A0F1C;--bg-surface:#111827;
            --bg-elevated:#1A2236;--bg-hover:#1E293B;
            --border:#1E293B;--border-light:#2D3A4F;
            --accent:#6366F1;--accent-light:#818CF8;--accent-glow:rgba(99,102,241,0.15);
            --green:#10B981;--amber:#F59E0B;--red:#EF4444;
            --text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;--text-dim:#475569;
            --font-body:'Inter',-apple-system,sans-serif;--font-mono:'JetBrains Mono',monospace;
        }
        body{font-family:var(--font-body);background:var(--bg-deep);color:var(--text-primary);height:100vh;overflow:hidden}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

        .app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:56px 1fr;height:100vh}

        /* HEADER */
        .header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--bg-primary);border-bottom:1px solid var(--border);z-index:10}
        .h-brand{display:flex;align-items:center;gap:12px}
        .h-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
        .h-title{font-size:16px;font-weight:600;letter-spacing:-0.02em}
        .h-title span{color:var(--accent-light)}
        .h-right{display:flex;align-items:center;gap:16px}
        .h-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}
        .dot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 6px}
        .dot.on{background:var(--green);box-shadow:0 0 6px rgba(16,185,129,0.5)}
        .dot.off{background:var(--red);box-shadow:0 0 6px rgba(239,68,68,0.5)}
        .mode-toggle{display:flex;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
        .mode-btn{padding:6px 14px;font-size:11px;font-family:var(--font-mono);color:var(--text-muted);cursor:pointer;border:none;background:transparent;transition:all 0.15s}
        .mode-btn.active{background:var(--accent);color:#fff}
        .mode-btn:hover:not(.active){background:var(--bg-hover);color:var(--text-secondary)}

        /* SIDEBAR */
        .sidebar{background:var(--bg-primary);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
        .sb-section{padding:20px 16px;border-bottom:1px solid var(--border)}
        .sb-section:last-child{border-bottom:none;flex:1;overflow-y:auto}
        .sb-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}

        /* UPLOAD */
        .upload-zone{border:1.5px dashed var(--border-light);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.2s}
        .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-glow)}
        .upload-zone.busy{border-color:var(--amber);pointer-events:none}
        .up-icon{font-size:28px;margin-bottom:8px}
        .up-text{font-size:13px;color:var(--text-secondary);line-height:1.5}
        .up-text strong{color:var(--accent-light);font-weight:500}
        .progress-track{height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;margin-top:12px}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:2px;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
        .up-status{font-size:11px;color:var(--text-muted);margin-top:6px;font-family:var(--font-mono)}

        /* DOC LIST */
        .doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;margin-bottom:4px;position:relative}
        .doc-item:hover{background:var(--bg-hover)}
        .doc-item.active{background:var(--accent-glow);border:1px solid rgba(99,102,241,0.2)}
        .doc-item.selected{outline:2px solid var(--amber);outline-offset:-2px}
        .doc-icon{width:34px;height:34px;background:var(--bg-elevated);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .doc-info{flex:1;min-width:0}
        .doc-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .doc-meta{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
        .doc-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px}
        .doc-item:hover .doc-del{display:flex}
        .doc-del:hover{background:rgba(239,68,68,0.15);color:var(--red)}
        .compare-hint{font-size:11px;color:var(--amber);padding:8px 12px;background:rgba(245,158,11,0.08);border-radius:6px;margin-top:8px;font-style:italic}

        /* MAIN */
        .main{display:flex;flex-direction:column;background:var(--bg-deep);overflow:hidden}
        .messages{flex:1;overflow-y:auto;padding:24px}

        /* EMPTY STATE */
        .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px}
        .empty-icon{font-size:48px;margin-bottom:16px;opacity:0.6}
        .empty-title{font-size:20px;font-weight:600;margin-bottom:8px}
        .empty-sub{font-size:14px;color:var(--text-muted);max-width:400px;line-height:1.6}
        .hints{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px;justify-content:center}
        .hint{font-size:12px;padding:8px 14px;background:var(--bg-surface);border:1px solid var(--border);border-radius:20px;color:var(--text-secondary);cursor:pointer;transition:all 0.15s}
        .hint:hover{border-color:var(--accent);color:var(--accent-light);background:var(--accent-glow)}

        /* MESSAGES */
        .msg{max-width:820px;margin:0 auto 20px;animation:fadeIn 0.3s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg-user{display:flex;justify-content:flex-end}
        .msg-user .bubble{background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px;padding:12px 18px;max-width:70%;font-size:14px;line-height:1.5}
        .msg-ai{display:flex;gap:12px}
        .ai-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:4px}
        .ai-content{flex:1;min-width:0}
        .ai-text{background:var(--bg-surface);border:1px solid var(--border);border-radius:4px 16px 16px 16px;padding:16px 20px;font-size:14px;line-height:1.7}
        .ai-text h2,.ai-text h3{font-size:14px;font-weight:600;color:var(--accent-light);margin:16px 0 8px}
        .ai-text h2:first-child,.ai-text h3:first-child{margin-top:0}
        .ai-text strong{font-weight:600}
        .ai-text ul,.ai-text ol{padding-left:20px;margin:8px 0}
        .ai-text li{margin-bottom:4px}
        .ai-text p{margin-bottom:10px}
        .ai-text p:last-child{margin-bottom:0}
        .compare-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--font-mono);padding:3px 8px;background:rgba(245,158,11,0.1);color:var(--amber);border-radius:4px;margin-bottom:8px}

        /* SOURCES */
        .src-toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:8px 0 0;font-family:var(--font-mono);transition:color 0.15s}
        .src-toggle:hover{color:var(--accent-light)}
        .src-panel{margin-top:10px;display:flex;flex-direction:column;gap:8px}
        .src-card{background:var(--bg-elevated);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:12px 14px;font-size:12px;line-height:1.6;color:var(--text-secondary);cursor:pointer;transition:all 0.15s}
        .src-card:hover{border-left-color:var(--accent-light);background:var(--bg-hover)}
        .src-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .src-label{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--accent-light);text-transform:uppercase;letter-spacing:0.05em}
        .src-coll{font-family:var(--font-mono);font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(99,102,241,0.1);color:var(--accent-light);margin-left:6px}
        .src-score{font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
        .s-hi{background:rgba(99,102,241,0.15);color:var(--accent-light)}
        .s-md{background:rgba(245,158,11,0.15);color:var(--amber)}
        .s-lo{background:rgba(100,116,139,0.15);color:var(--text-muted)}
        .src-text{font-size:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
        .src-text.open{-webkit-line-clamp:unset}

        /* INPUT */
        .input-area{padding:16px 24px 24px;background:var(--bg-deep)}
        .input-row{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
        .input-wrap{flex:1}
        .input-field{width:100%;padding:14px 18px;background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;resize:none;min-height:48px;max-height:120px;transition:border-color 0.2s}
        .input-field::placeholder{color:var(--text-dim)}
        .input-field:focus{border-color:var(--accent)}
        .send-btn{width:48px;height:48px;background:var(--accent);border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
        .send-btn:hover{background:var(--accent-light);transform:scale(1.05)}
        .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
        .send-btn svg{width:20px;height:20px;fill:#fff}

        /* LOADING */
        .dots{display:flex;gap:5px;padding:8px 0}
        .dots span{width:7px;height:7px;background:var(--text-dim);border-radius:50%;animation:bounce 1.4s infinite ease-in-out both}
        .dots span:nth-child(1){animation-delay:-0.32s}
        .dots span:nth-child(2){animation-delay:-0.16s}
        @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

        @media(max-width:768px){
            .app{grid-template-columns:1fr}
            .sidebar{display:none}
            .mob-toggle{display:flex!important}
            .sidebar.mob-open{display:flex;position:fixed;top:56px;left:0;right:0;bottom:0;z-index:20}
        }
        .mob-toggle{display:none;width:36px;height:36px;align-items:center;justify-content:center;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--text-secondary);font-size:18px}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect,useCallback}=React;
const API="http://localhost:8000/api/v1";

function md(t){
    if(!t)return"";
    return('<p>'+t
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/###\s(.*?)(\n|$)/g,'<h3>$1</h3>')
        .replace(/##\s(.*?)(\n|$)/g,'<h2>$1</h2>')
        .replace(/\n- /g,'\n• ')
        .replace(/\n\n/g,'</p><p>')
        .replace(/\n/g,'<br/>')+'</p>');
}
function sc(s){return s>=0.7?'s-hi':s>=0.5?'s-md':'s-lo'}

function SourceCard({s,showColl}){
    const[open,setOpen]=useState(false);
    return(
        <div className="src-card" onClick={()=>setOpen(!open)}>
            <div className="src-head">
                <span>
                    <span className="src-label">Chunk #{s.chunk_index}</span>
                    {showColl&&s.collection&&<span className="src-coll">{s.collection}</span>}
                </span>
                <span className={`src-score ${sc(s.score)}`}>{(s.score*100).toFixed(1)}%</span>
            </div>
            <div className={`src-text ${open?'open':''}`}>{s.content}</div>
        </div>
    );
}

function Message({m,isCompare}){
    const[showSrc,setShowSrc]=useState(false);
    if(m.role==='user')return(<div className="msg msg-user"><div className="bubble">{m.content}</div></div>);
    return(
        <div className="msg msg-ai">
            <div className="ai-avatar">F</div>
            <div className="ai-content">
                {isCompare&&<div className="compare-badge">⚖ COMPARE MODE</div>}
                <div className="ai-text" dangerouslySetInnerHTML={{__html:md(m.content)}}/>
                {m.sources&&m.sources.length>0&&(
                    <>
                        <div className="src-toggle" onClick={()=>setShowSrc(!showSrc)}>
                            {showSrc?'▾':'▸'} {m.sources.length} sources referenced
                        </div>
                        {showSrc&&<div className="src-panel">
                            {m.sources.map((s,i)=><SourceCard key={i} s={s} showColl={isCompare}/>)}
                        </div>}
                    </>
                )}
            </div>
        </div>
    );
}

function App(){
    const[docs,setDocs]=useState([]);
    const[activeDoc,setActiveDoc]=useState(null);
    const[compareMode,setCompareMode]=useState(false);
    const[compareDocs,setCompareDocs]=useState([]);
    const[msgs,setMsgs]=useState([]);
    const[input,setInput]=useState('');
    const[loading,setLoading]=useState(false);
    const[uploading,setUploading]=useState(false);
    const[upStatus,setUpStatus]=useState('');
    const[dragOver,setDragOver]=useState(false);
    const[online,setOnline]=useState(false);
    const[mobOpen,setMobOpen]=useState(false);
    const endRef=useRef(null);
    const fileRef=useRef(null);

    // Health check
    useEffect(()=>{
        const ck=async()=>{try{const r=await fetch('http://localhost:8000/health');setOnline(r.ok)}catch{setOnline(false)}};
        ck();const i=setInterval(ck,10000);return()=>clearInterval(i);
    },[]);

    // Load docs from server
    const loadDocs=useCallback(async()=>{
        try{
            const r=await fetch(`${API}/documents`);
            if(r.ok){
                const d=await r.json();
                setDocs(d.collections.map(c=>({name:c.name,collection:c.name,chunks:c.points_count,dimension:384})));
            }
        }catch{}
    },[]);
    useEffect(()=>{if(online)loadDocs()},[online,loadDocs]);

    useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,loading]);

    // Upload
    const handleUpload=async(file)=>{
        if(!file||!file.name.endsWith('.pdf')){alert('Please upload a PDF file.');return}
        setUploading(true);setUpStatus('Extracting text...');
        const fd=new FormData();fd.append('file',file);
        try{
            setTimeout(()=>setUpStatus('Chunking document...'),2000);
            setTimeout(()=>setUpStatus('Generating embeddings...'),5000);
            setTimeout(()=>setUpStatus('Storing in vector DB...'),10000);
            const r=await fetch(`${API}/upload`,{method:'POST',body:fd});
            if(!r.ok)throw new Error('Upload failed');
            const d=await r.json();
            const newDoc={name:d.filename,collection:d.collection_name,chunks:d.total_chunks,dimension:d.vector_dimension};
            setDocs(prev=>{const exists=prev.find(p=>p.collection===newDoc.collection);return exists?prev.map(p=>p.collection===newDoc.collection?newDoc:p):[...prev,newDoc]});
            setActiveDoc(newDoc);setCompareMode(false);setCompareDocs([]);
            setMsgs([{role:'assistant',content:`**${d.filename}** processed successfully.\n\n- **${d.total_chunks}** chunks extracted\n- **${d.vector_dimension}**-dimensional embeddings\n- Collection: \`${d.collection_name}\`\n\nAsk anything about this document.`,sources:[]}]);
        }catch(e){alert('Upload failed: '+e.message)}
        finally{setUploading(false);setUpStatus('')}
    };

    // Delete doc
    const handleDelete=async(e,doc)=>{
        e.stopPropagation();
        if(!confirm(`Delete ${doc.name}?`))return;
        try{
            await fetch(`${API}/documents/${doc.collection}`,{method:'DELETE'});
            setDocs(prev=>prev.filter(d=>d.collection!==doc.collection));
            if(activeDoc?.collection===doc.collection)setActiveDoc(null);
            setCompareDocs(prev=>prev.filter(c=>c!==doc.collection));
        }catch(e){alert('Delete failed')}
    };

    // Toggle compare selection
    const toggleCompare=(doc)=>{
        setCompareDocs(prev=>{
            if(prev.includes(doc.collection))return prev.filter(c=>c!==doc.collection);
            if(prev.length>=4)return prev;
            return[...prev,doc.collection];
        });
    };

    // Send message
    const handleSend=async()=>{
        if(!input.trim()||loading)return;
        const q=input.trim();setInput('');
        setMsgs(prev=>[...prev,{role:'user',content:q}]);setLoading(true);
        try{
            let endpoint,body,isComp=false;
            if(compareMode&&compareDocs.length>=2){
                endpoint=`${API}/compare`;
                body={collection_names:compareDocs,question:q,top_k:3};
                isComp=true;
            }else if(activeDoc){
                endpoint=`${API}/query`;
                body={collection_name:activeDoc.collection,question:q,top_k:5};
            }else{
                endpoint=`${API}/chat`;
                body={message:q};
            }
            const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
            if(!r.ok)throw new Error('Request failed');
            const d=await r.json();
            setMsgs(prev=>[...prev,{role:'assistant',content:d.answer||d.response,sources:d.sources||[],isCompare:isComp}]);
        }catch{
            setMsgs(prev=>[...prev,{role:'assistant',content:'Something went wrong. Check the server and try again.',sources:[]}]);
        }finally{setLoading(false)}
    };

    const handleKey=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}};

    const placeholder=compareMode&&compareDocs.length>=2
        ?`Compare ${compareDocs.length} documents...`
        :activeDoc?`Ask about ${activeDoc.name}...`
        :'Ask a financial question or upload a document...';

    return(
        <div className="app">
            <header className="header">
                <div className="h-brand">
                    <div className="mob-toggle" onClick={()=>setMobOpen(!mobOpen)}>☰</div>
                    <div className="h-logo">F</div>
                    <div className="h-title">Fin<span>Lens</span> AI</div>
                </div>
                <div className="h-right">
                    <div className="mode-toggle">
                        <button className={`mode-btn ${!compareMode?'active':''}`} onClick={()=>{setCompareMode(false);setCompareDocs([])}}>QUERY</button>
                        <button className={`mode-btn ${compareMode?'active':''}`} onClick={()=>{setCompareMode(true);setActiveDoc(null)}}>COMPARE</button>
                    </div>
                    <div className="h-status">
                        <div className={`dot ${online?'on':'off'}`}/>
                        {online?'ONLINE':'OFFLINE'}
                    </div>
                </div>
            </header>

            <aside className={`sidebar ${mobOpen?'mob-open':''}`}>
                <div className="sb-section">
                    <div className="sb-label">Upload Document</div>
                    <div className={`upload-zone ${dragOver?'drag':''} ${uploading?'busy':''}`}
                        onClick={()=>!uploading&&fileRef.current?.click()}
                        onDragOver={e=>{e.preventDefault();setDragOver(true)}}
                        onDragLeave={()=>setDragOver(false)}
                        onDrop={e=>{e.preventDefault();setDragOver(false);handleUpload(e.dataTransfer.files[0])}}>
                        <div className="up-icon">{uploading?'⏳':'📄'}</div>
                        <div className="up-text">{uploading?upStatus||'Processing...':<>Drop PDF here or <strong>click to browse</strong></>}</div>
                        {uploading&&<div className="progress-track"><div className="progress-fill" style={{width:'100%'}}/></div>}
                    </div>
                    <input ref={fileRef} type="file" accept=".pdf" style={{display:'none'}} onChange={e=>handleUpload(e.target.files[0])}/>
                </div>
                <div className="sb-section">
                    <div className="sb-label">
                        <span>Documents ({docs.length})</span>
                        {compareMode&&<span style={{color:'var(--amber)',fontSize:9}}>SELECT 2+</span>}
                    </div>
                    {docs.length===0?<div style={{fontSize:12,color:'var(--text-dim)',padding:'8px 0'}}>No documents uploaded yet</div>:
                        docs.map((doc,i)=>(
                            <div key={i}
                                className={`doc-item ${!compareMode&&activeDoc?.collection===doc.collection?'active':''} ${compareMode&&compareDocs.includes(doc.collection)?'selected':''}`}
                                onClick={()=>compareMode?toggleCompare(doc):setActiveDoc(doc)}>
                                <div className="doc-icon">{compareMode&&compareDocs.includes(doc.collection)?'✓':'📊'}</div>
                                <div className="doc-info">
                                    <div className="doc-name">{doc.name}</div>
                                    <div className="doc-meta">{doc.chunks} chunks • {doc.dimension}d</div>
                                </div>
                                <button className="doc-del" onClick={e=>handleDelete(e,doc)}>✕</button>
                            </div>
                        ))
                    }
                    {compareMode&&compareDocs.length===1&&<div className="compare-hint">Select one more document to compare</div>}
                    {compareMode&&compareDocs.length>=2&&<div className="compare-hint" style={{color:'var(--green)',background:'rgba(16,185,129,0.08)'}}>Ready to compare {compareDocs.length} documents</div>}
                </div>
            </aside>

            <main className="main">
                <div className="messages">
                    {msgs.length===0?(
                        <div className="empty">
                            <div className="empty-icon">{compareMode?'⚖️':'📈'}</div>
                            <div className="empty-title">{compareMode?'Compare Documents':'Financial Research Terminal'}</div>
                            <div className="empty-sub">{compareMode?'Select 2 or more documents from the sidebar, then ask a comparison question.':'Upload an annual report, then ask questions. Answers are grounded in the document with source citations.'}</div>
                            {!compareMode&&<div className="hints">
                                <div className="hint" onClick={()=>setInput('What was the total revenue this year?')}>Revenue analysis</div>
                                <div className="hint" onClick={()=>setInput('What are the key risk factors mentioned?')}>Risk factors</div>
                                <div className="hint" onClick={()=>setInput('Summarize the chairman\'s letter')}>Chairman's letter</div>
                                <div className="hint" onClick={()=>setInput('What is the debt-to-equity ratio?')}>D/E ratio</div>
                            </div>}
                        </div>
                    ):msgs.map((m,i)=><Message key={i} m={m} isCompare={m.isCompare}/>)}
                    {loading&&<div className="msg msg-ai"><div className="ai-avatar">F</div><div className="ai-content"><div className="ai-text"><div className="dots"><span/><span/><span/></div></div></div></div>}
                    <div ref={endRef}/>
                </div>
                <div className="input-area">
                    <div className="input-row">
                        <div className="input-wrap">
                            <textarea className="input-field" placeholder={placeholder} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} rows={1}/>
                        </div>
                        <button className="send-btn" onClick={handleSend} disabled={!input.trim()||loading}>
                            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
